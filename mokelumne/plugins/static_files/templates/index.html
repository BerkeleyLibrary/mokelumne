<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
</head>
<body>
  <h1>{{ title }}</h1>
  {% if entries %}
  <ul>
    {% for href, label in entries %}
    <li><a href="{{ href }}">{{ label }}</a></li>
    {% endfor %}
  </ul>
  {% else %}
  <p>No files.</p>
  {% endif %}
</body>
</html>
